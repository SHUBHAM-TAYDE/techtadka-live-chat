# nginx/docker.conf
# Used by docker-compose.prod.yml
# Mirrors the Utho Cloud LB behaviour: ip_hash sticky sessions + WebSocket upgrade

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Upstream pool — 3 Node.js instances ──────────────────────────────────
    upstream chat_backend {
        ip_hash;              # Sticky sessions — same client → same instance
        server app1:5000;
        server app2:5000;
        server app3:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Serve React frontend ─────────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Proxy REST API ───────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://chat_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # ── Proxy WebSocket (Socket.io) ───────────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://chat_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            proxy_pass       http://chat_backend;
            proxy_http_version 1.1;
            access_log       off;
        }
    }
}
