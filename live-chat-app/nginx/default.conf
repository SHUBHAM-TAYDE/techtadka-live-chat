# ─────────────────────────────────────────────────────────────────────────────
# Nginx config for Live Chat App
# Place this at: /etc/nginx/sites-available/live-chat
# Then: sudo ln -s /etc/nginx/sites-available/live-chat /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

upstream chat_backend {
    # Add one line per Node.js instance (replace IPs with your Utho VM private IPs)
    # ip_hash ensures the same client hits the same backend — important for Socket.io polling fallback
    ip_hash;
    server 10.0.0.1:5000;
    server 10.0.0.2:5000;
    server 10.0.0.3:5000;

    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ─── SSL (Let's Encrypt) ────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ─── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Gzip ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # ─── Serve React frontend (built with: npm run build) ───────────────────
    root /var/www/live-chat/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Proxy REST API ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://chat_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─── Proxy WebSocket (Socket.io) ────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://chat_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;  # Keep WebSocket connections alive
        proxy_send_timeout 86400s;
    }

    # ─── Health check endpoint (Utho LB health probe) ───────────────────────
    location /health {
        proxy_pass       http://chat_backend;
        proxy_http_version 1.1;
        access_log       off;
    }
}
